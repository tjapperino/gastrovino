services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER:     gastrovino
      POSTGRES_PASSWORD: gastrovino
      POSTGRES_DB:       gastrovino
    ports:
      - "5432:5432"
    volumes:
      - gastrovino_pgdata:/var/lib/postgresql/data

volumes:
  gastrovino_pgdata:
